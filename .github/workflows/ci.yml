name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Lint 검사
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

  # 단위 테스트
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test -- --run

  # 테스트 커버리지
  coverage:
    runs-on: ubuntu-latest
    name: Test Coverage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test coverage
        run: pnpm run test:coverage -- --run

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # E2E 테스트
  # 시드 스크립트의 순환 의존/어댑터 이슈를 수정해 재활성화됨:
  #   - users-seed: PrismaPg 어댑터(Prisma 7 필수)
  #   - budget-seed.managerId / users-seed.userYearRole.departmentId: 상대가 아직
  #     시드 안 됐으면 null 처리(budget↔users 순환 FK 방지)
  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: expense_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/expense_test
        run: pnpm exec prisma db push

      - name: Seed database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/expense_test
          NODE_ENV: development
        run: |
          pnpm run db:seed
          pnpm run db:seed:users

      - name: Build application
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/expense_test
          USER_JWT_SECRET: ci-e2e-secret-not-for-production-min-32
          SUPER_ADMIN_JWT_SECRET: ci-e2e-superadmin-secret-not-for-prod-32
        run: pnpm run build

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/expense_test
          USER_JWT_SECRET: ci-e2e-secret-not-for-production-min-32
          SUPER_ADMIN_JWT_SECRET: ci-e2e-superadmin-secret-not-for-prod-32
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # 빌드 검증
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          # 빌드 시 NODE_ENV=production 이라 getUserJwtSecret() 가 미설정이면 throw.
          # 실 시크릿은 배포 환경변수로 주입되며, CI 빌드 검증용 더미.
          USER_JWT_SECRET: ci-build-secret-not-for-production-min-32
          SUPER_ADMIN_JWT_SECRET: ci-build-superadmin-secret-not-for-prod-32
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7

  # Python 백엔드 (FastAPI) — lint + 단위 테스트
  # 전략: strangler-fig 이전 중이므로 값싼 게이트(ruff check + pytest, SQLite)만 지금 블로킹.
  #       coverage 임계치는 Phase 6, E2E는 각 도메인 프록시 전환 시점에 추가한다.
  backend:
    runs-on: ubuntu-latest
    name: Backend (Python)
    defaults:
      run:
        working-directory: backend
    env:
      RUNNING_ZONE: local  # 테스트는 SQLite 로컬 존으로 실행 (db/guard.py 부팅 가드 충족)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev  # .python-version(3.12) 기준 파이썬 + 의존성 설치 (= build 검증)

      - name: Run ruff (lint)
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest -q

  # 배포 (main 브랜치만)
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy
    needs: [lint, test, coverage, e2e, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          USER_JWT_SECRET: ci-deploy-secret-not-for-production-min-32
          SUPER_ADMIN_JWT_SECRET: ci-deploy-superadmin-secret-not-for-prod32
        run: pnpm run build

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # 실제 배포 스크립트는 환경에 따라 다름
          # 예: Render, Vercel, AWS 등의 배포 명령어
