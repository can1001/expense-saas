# Render Blueprint - 자동이체 배치 Cron Job
#
# 주의:
# - 기존 웹 서비스는 Render 대시보드에서 직접 설정되어 있어 본 파일에 포함하지 않음
# - 본 Blueprint는 자동이체(정기 지출결의서) 자동 생성용 Cron Job 서비스만 정의
# - 적용 시 Render 대시보드에서 "Add new service only" 옵션으로 추가할 것
#
# 환경변수 설정 (대시보드에서 수동 입력):
# - CRON_SECRET: 웹 서비스와 동일한 값으로 설정 (openssl rand -base64 32)
# - APP_URL: 운영 웹 서비스 URL (예: https://expense-system.onrender.com)

services:
  - type: cron
    name: expense-recurring-process
    runtime: node
    # Render Cron 스케줄은 UTC 기준
    # UTC 18:00 = KST 03:00 (매일 새벽 3시)
    schedule: "0 18 * * *"
    buildCommand: "echo 'No build required - script uses Node built-ins only'"
    startCommand: "node scripts/cron-recurring-process.mjs"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_URL
        sync: false
